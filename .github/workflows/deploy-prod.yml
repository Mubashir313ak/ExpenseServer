name: Deploy to Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install production dependencies
        run: npm install --production

      - name: Zip package
        run: zip -r function.zip . -x ".git/*" -x ".github/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Lambda function code
        run: aws lambda update-function-code --function-name expensetracker --zip-file fileb://function.zip

      - name: Wait for update to finish
        run: aws lambda wait function-updated --function-name expensetracker

      - name: Set prod environment variables
        run: aws lambda update-function-configuration --function-name expensetracker --environment "Variables={MONGODB_URI=${{ secrets.PROD_MONGODB_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }}}"

      - name: Wait for config update
        run: aws lambda wait function-updated --function-name expensetracker

      - name: Publish new version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version --function-name expensetracker --query 'Version' --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update prod alias to new version
        run: aws lambda update-alias --function-name expensetracker --name prod --function-version ${{ steps.publish.outputs.version }}
